<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para o Meu Amor ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#ff6b81,#ff8fa3,#ffc2d1,#ffe5ec);
    background-size:400% 400%;
    animation:fundo 12s ease infinite;
    font-family:'Segoe UI',sans-serif;
}

@keyframes fundo{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:90%;
    max-width:800px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:40px;
    text-align:center;
    color:white;
    box-shadow:0 0 30px rgba(0,0,0,0.15);
    z-index:2;
}

h1{
    margin-bottom:20px;
    font-size:2rem;
}

p{
    font-size:1.3rem;
    line-height:1.8;
}

button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4d6d;
    font-size:1.1rem;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

.heart{
    position:absolute;
    color:white;
    animation:cair linear forwards;
    opacity:.8;
}

@keyframes cair{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(110vh);
    }
}

.final{
    animation:brilhar 1s infinite alternate;
}

@keyframes brilhar{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.05);
    }
}

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    animation:confetti 4s linear forwards;
}

@keyframes confetti{
    from{
        transform:translateY(-50px) rotate(0deg);
    }
    to{
        transform:translateY(120vh) rotate(720deg);
    }
}
</style>
</head>
<body>

<!-- Coloca o ficheiro Coldplay-Sparks.mp3 na mesma pasta -->
<audio id="musica" autoplay loop>
    <source src="Coldplay-Sparks.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <h1 id="titulo"></h1>
    <p id="texto"></p>
    <button id="botao" onclick="seguinte()">Seguinte ❤️</button>
</div>

<script>

const paginas = [
{
titulo:"Motivos para eu abandonar-te",
texto:"Nenhum."
},
{
titulo:"Por que clicaste?",
texto:"Nunca tive nem terei motivos para te abandonar. ❤️"
},
{
titulo:"Clica aí 👇",
texto:"Porque ainda tenho muito para te dizer."
},
{
titulo:"Vamos fazer de novo?",
texto:"Mais uma vez. 😊"
},
{
titulo:"Motivos do porquê de eu amar-te mais a cada dia ❤️",
texto:"Porque cada momento contigo faz-me perceber a sorte que tenho."
},
{
titulo:"Alguns dos motivos...",
texto:`
❤️ Os teus olhos lindos.<br><br>
😊 O teu sorriso maravilhoso.<br><br>
🥰 O teu carinho.<br><br>
💕 A forma como me fazes sentir amado.<br><br>
✨ O teu jeito único de ser.
`
},
{
titulo:"Um poema para ti 🌹",
texto:`
Como na Bela e o Monstro,<br><br>

Aprendi que a verdadeira beleza não está apenas na aparência.<br><br>

Ela encontra-se na bondade,
nos pequenos gestos,
nos sorrisos sinceros
e no coração de alguém especial.<br><br>

E foi no teu coração que encontrei
o meu lugar favorito no mundo. ❤️
`
},
{
titulo:"EU AMO-TE AMOR ❤️",
texto:`
Hoje, amanhã e em todos os dias que vierem.<br><br>

❤️ <strong>Always and Forever ❤️</strong>
`
}
];

let atual = 0;

const titulo = document.getElementById("titulo");
const texto = document.getElementById("texto");
const botao = document.getElementById("botao");

function mostrarPagina(){

    titulo.innerHTML = paginas[atual].titulo;
    texto.innerHTML = paginas[atual].texto;

    if(atual === paginas.length - 1){

        titulo.classList.add("final");

        botao.style.display = "none";

        criarConfetti();
    }
}

function seguinte(){

    if(atual < paginas.length - 1){
        atual++;
        mostrarPagina();
    }
}

mostrarPagina();

document.body.addEventListener("click", () => {
    document.getElementById("musica").play();
}, {once:true});

function criarCoracao(){

    const heart = document.createElement("div");

    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 30) + "px";
    heart.style.animationDuration = (4 + Math.random() * 5) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 9000);
}

setInterval(criarCoracao, 300);

function criarConfetti(){

    for(let i = 0; i < 120; i++){

        const c = document.createElement("div");

        c.className = "confetti";

        c.style.left = Math.random() * 100 + "vw";

        c.style.background =
        `hsl(${Math.random() * 360},100%,60%)`;

        c.style.animationDuration =
        (2 + Math.random() * 3) + "s";

        document.body.appendChild(c);

        setTimeout(() => {
            c.remove();
        }, 5000);
    }
}
</script>

</body>
</html>
